<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>book-a-table</title>
</head>

<body>

	<div class="container">
		<header>
			<div id="header"></div>
		</header>
		<main>
			<section class="book-a-table-section">
				<div class="book-a-table-thema">
					<h1>Book A Table</h1>
					<p>We consider all the drivers of change gives you the components <br> you need to change to create a truly
						happens.</p>
				</div>
				<div class="book-a-table-card1">
					<div class="book-a-table-card">
						<div class="book-a-table-card-info">
							<div class="contact-card-name">
								<label>Name</label>
								<input type="text" placeholder="Enter your name">
							</div>
							<div class="contact-card-email">
								<label>Email</label>
								<input type="text" placeholder="Enter email address">
							</div>
						</div>
						<div class="book-a-table-card-subject">
							<label>Subject</label>
							<input type="text" placeholder="Write a subject">
						</div>
						<div class="book-a-table-card-message">
							<label>Massage</label>
							<input type="text" placeholder="Write your message">
						</div>
						<div class="book-a-table-btn">
							<a href="#" class="contact-btn">Send</a>
						</div>
					</div>
				</div>
				<div class="book-a-table-navigator">
					<iframe
						src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2520.298443836973!2d69.21032618851807!3d41.30545150035291!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x38ae8b41a1a8e5a5%3A0xab24aaf488258dd7!2z0KjQutC-0LvQsCDihJYxNTcg0LjQvNC10L3QuCDQlNC40L4g0JHRgNCw0L3QtNC-!5e0!3m2!1suz!2s!4v1771845608177!5m2!1suz!2s"
						width="100%" height="550" style="border:0;" allowfullscreen="" loading="lazy"
						referrerpolicy="no-referrer-when-downgrade"></iframe>
				</div>
			</section>
		</main>

		<footer>
			<div id="footer"></div>
		</footer>
	</div>

	<script src="./js/scrip.js"></script>
</body>

</html>
