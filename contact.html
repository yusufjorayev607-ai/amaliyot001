<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>contact us</title>
	<link rel="stylesheet" href="./css/style.css">
</head>

<body>
	<div id="header"></div>
	<main>
		<section class="contact-section">
			<div class="contact">
				<div class="contact-text">
					<h1>Contact Us</h1>
					<p>We consider all the drivers of change gives you the components <br>you need to change to create a truly
						happens.
					</p>
				</div>
				<div class="contact-card">
					<div class="contact-card-info">
						<div class="contact-card-name">
							<label>Name</label>
							<input type="text" placeholder="Enter your name">
						</div>
						<div class="contact-card-email">
							<label>Email</label>
							<input type="text" placeholder="Enter email address">
						</div>
					</div>
					<div class="contact-card-subject">
						<label>Subject</label>
						<input type="text" placeholder="Write a subject">
					</div>
					<div class="contact-card-message">
						<label>Massage</label>
						<input type="text" placeholder="Write your message">
					</div>
					<div class="contact-btn">
						<a href="#" class="contact-btn">Send</a>
					</div>
				</div>
				<div class="contact-info">
					<div class="call">
						<h2>Call Us:</h2>
						<h3>+99893-821-21-37</h3>
					</div>
					<div class="hours">
						<h2>Hours:</h2>
						<p>Mon-Fri: 11am - 8pm <br>
							Sat, Sun: 9am - 10pm</p>
					</div>
					<div class="our-location">
						<h2>Our Location:</h2>
						<p>Oq-tepa</p>
					</div>
				</div>
			</div>


		</section>

	</main>
	<div id="footer"></div>

</body>
<script src="./js/scrip.js"></script>

</html>
